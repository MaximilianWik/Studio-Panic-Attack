<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo/PanicAttackLogo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#050505" />
    <meta name="description" content="Studio Panic Attack — interactive portfolio." />
    <title>Studio Panic Attack</title>

    <!-- Above-the-fold logo: prioritise so the hero composes on first paint. -->
    <link rel="preload" as="image" href="/logo/PanicAttackLogo.png" fetchpriority="high" />

    <!-- Pre-warm the gallery's first batch so the carousel doesn't pop-in
         when the user scrolls past the hero. URLs are weserv-proxied
         WebPs that match what useImageAssets.ts emits in prod — same
         URL = same browser-cache entry, no double-fetch.
         (In dev these 404 from the local server; harmless console noise.) -->
    <link rel="preload" as="image" crossorigin="anonymous" href="https://images.weserv.nl/?url=max-wik.com/landing/artist-frame-1.png&w=2000&output=webp&q=82&we=1" />
    <link rel="preload" as="image" crossorigin="anonymous" href="https://images.weserv.nl/?url=max-wik.com/landing/artist-frame-2.png&w=2000&output=webp&q=82&we=1" />
    <link rel="preload" as="image" crossorigin="anonymous" href="https://images.weserv.nl/?url=max-wik.com/landing/img_4145-1.jpg&w=2000&output=webp&q=82&we=1" />
    <link rel="preload" as="image" crossorigin="anonymous" href="https://images.weserv.nl/?url=max-wik.com/landing/img_4253-1.jpg&w=2000&output=webp&q=82&we=1" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
